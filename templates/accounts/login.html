{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="form-card">
            <h1 class="form-title">Welcome Back</h1>
            <p class="form-subtitle">Log in to your Sayil account</p>

            {% if form.errors %}
            <div class="alert alert-danger">
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Username</label>
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="Your username"
                        required autofocus>
                </div>
                <div class="form-group">
                    <label for="id_password">Password</label>
                    <input type="password" name="password" id="id_password" class="form-control"
                        placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>

                {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
            </form>

            <p class="form-link">
                Don't have an account? <a href="{% url 'accounts:register' %}">Sign up</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
