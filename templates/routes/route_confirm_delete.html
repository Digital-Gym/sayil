{% extends 'base.html' %}
{% block title %}Delete Route{% endblock %}

{% block content %}
<div class="confirm-card">
    <h2>Delete "{{ route.title }}"?</h2>
    <p>This action cannot be undone. All reviews for this route will also be deleted.</p>
    <form method="post">
        {% csrf_token %}
        <div class="confirm-actions">
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash"></i> Delete
            </button>
            <a href="{{ route.get_absolute_url }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
