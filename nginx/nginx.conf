upstream sayil_web {
    server web:8000;
}

server {
    listen 80;
    server_name sayil.uz www.sayil.uz;

    # prove letsencrypt that we are who we are
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name sayil.uz www.sayil.uz;

    ssl_certificate /etc/letsencrypt/live/sayil.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sayil.uz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 5M;

    location / {
        proxy_pass http://sayil_web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /app/media/;
    }
}