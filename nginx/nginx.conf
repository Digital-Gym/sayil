upstream sayil_web {
    server web:8000;
}

server {
    listen 80;
    server_name sayil.uz www.sayil.uz sayil.bobomurod.uz;

    location / {
        proxy_pass http://sayil_web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /app/media/;
    }
}
