name: Sayil CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  DOCKER_IMAGE_NAME: sayil-web

jobs:
  # JOB 1 — TEST
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sayil_test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Pytest
        env:
          SECRET_KEY: test-secret-key
          DEBUG: "True"
          DB_NAME: sayil_test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          pytest

  # JOB 2 — BUILD & PUSH TO DOCKER HUB
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          echo "image_tag=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.image_tag }}:latest
            ${{ steps.meta.outputs.image_tag }}:${{ github.sha }}

  # JOB 3 — ZERO-DOWNTIME DEPLOY VIA SSH
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/sayil

            # Pull latest code (docker-compose.yml / nginx.conf changes)
            git pull origin main

            # Pull the latest web image from Docker Hub
            docker pull ${{ needs.build-and-push.outputs.image_tag }}:latest

            # Recreate only the web container
            docker compose up -d --no-deps --force-recreate web

            # Wait for the new web container to become healthy

            echo "Waiting for web container to become healthy..."
            RETRIES=24
            until [ "$(docker inspect --format='{{.State.Health.Status}}' sayil-web-1 2>/dev/null)" = "healthy" ] || [ "$RETRIES" -eq 0 ]; do
              echo "  still waiting... ($RETRIES retries left)"
              sleep 5
              RETRIES=$((RETRIES - 1))
            done

            if [ "$RETRIES" -eq 0 ]; then
              echo "❌ New container failed to become healthy. Rolling back..."
              docker compose up -d --no-deps --force-recreate web
              exit 1
            fi

            echo "Web container is healthy."

            # Reload nginx config
            docker compose exec -T nginx nginx -s reload

            # Bring up any other services that may have changed
            docker compose up -d --remove-orphans

            # Remove unused images to free disk space
            docker image prune -af

            echo "DEPLOYMENT IS FINISHED!"
