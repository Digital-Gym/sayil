services:
  web:
    build: .
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sayil_network

  db:
    image: postgres:18-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME:-sayil_db}
      - POSTGRES_USER=${DB_USER:-sayil_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-sayil_secure_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sayil_user} -d ${DB_NAME:-sayil_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sayil_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - sayil_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  sayil_network:
